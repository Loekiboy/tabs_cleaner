<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      color: #00d4ff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 .icon {
      font-size: 20px;
    }

    .description {
      font-size: 12px;
      color: #888;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    label {
      font-size: 13px;
      color: #aaa;
      display: block;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 80px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 10px;
      font-size: 13px;
      resize: none;
      outline: none;
      font-family: inherit;
    }

    textarea:focus {
      border-color: #00d4ff;
    }

    textarea::placeholder {
      color: #555;
    }

    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #00d4ff;
      color: #1a1a2e;
    }

    .btn-primary:hover {
      background: #00b8d9;
    }

    .btn-primary:disabled {
      background: #444;
      color: #777;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
      text-align: center;
      min-height: 16px;
    }

    #status.error {
      color: #ff6b6b;
    }

    #status.success {
      color: #51cf66;
    }

    .tab-count {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }

    #preview {
      display: none;
      margin-top: 12px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    #preview h3 {
      font-size: 12px;
      color: #ff6b6b;
      margin-bottom: 8px;
    }

    #preview .tab-item {
      font-size: 11px;
      color: #ccc;
      padding: 3px 0;
      border-bottom: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-confirm {
      background: #ff6b6b;
      color: white;
    }

    .btn-confirm:hover {
      background: #e05555;
    }

    .btn-cancel {
      background: #333;
      color: #ccc;
    }

    .btn-cancel:hover {
      background: #444;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-group .btn {
      margin-top: 0;
      flex: 1;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #555;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1><span class="icon">🧹</span> Web Page Cleaner</h1>
  <p class="description">
    Describe which tabs you want to close. The extension uses Gemini AI to determine which tabs to close.
  </p>
  <p class="tab-count">Open tabs: <strong id="tabCount">...</strong></p>

  <div id="inputSection">
    <label for="request">Which pages do you want to remove?</label>
    <textarea id="request" placeholder="E.g., 'all tabs not related to programming' or 'tabs I haven't used in 24 hours'"></textarea>

    <button id="submitBtn" class="btn btn-primary">Analyze with Gemini</button>
  </div>

  <div id="preview">
    <h3>Closed tabs:</h3>
    <div id="previewList"></div>
  </div>

  <p id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
